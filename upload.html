<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Video - Minoz Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], },
                    colors: {
                        brand: { 500: '#ec4899', 600: '#db2777', },
                        dark: { 800: '#1f2937', 900: '#111827', 950: '#030712' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-950 text-gray-100 font-sans antialiased overflow-x-hidden min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass fixed w-full z-50 top-0 transition-all duration-300 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-brand-500/30">M</div>
                    <a href="index.html" class="text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">Minoz Gallery</a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-center space-x-8">
                        <a href="index.html" class="text-gray-400 hover:text-white relative group px-1 py-2 text-sm font-semibold transition-colors">Home</a>
                        <a href="gallery.html" class="text-gray-400 hover:text-white relative group px-1 py-2 text-sm font-semibold transition-colors">Videos</a>
                        <a href="about.html" class="text-gray-400 hover:text-white relative group px-1 py-2 text-sm font-semibold transition-colors">About</a>
                        <a href="upload.html" class="bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg shadow-purple-500/30 flex items-center gap-2 hover:scale-105">
                            <i class="fas fa-cloud-upload-alt"></i> Upload Video
                        </a>
                    </div>
                </div>
                <!-- Mobile button -->
                <div class="-mr-2 flex md:hidden">
                    <button type="button" id="mobile-menu-button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white focus:outline-none"><i class="fas fa-bars text-2xl"></i></button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div class="md:hidden hidden bg-dark-900 border-b border-gray-800" id="mobile-menu">
            <div class="px-4 pt-4 pb-6 space-y-2">
                <a href="index.html" class="text-gray-400 hover:text-white hover:bg-white/5 block px-4 py-3 rounded-xl text-base font-semibold">Home</a>
                <a href="gallery.html" class="text-gray-400 hover:text-white hover:bg-white/5 block px-4 py-3 rounded-xl text-base font-semibold">Videos</a>
                <a href="about.html" class="text-gray-400 hover:text-white hover:bg-white/5 block px-4 py-3 rounded-xl text-base font-semibold">About</a>
                <a href="upload.html" class="text-brand-500 font-bold block px-4 py-3 rounded-xl text-base mt-4 bg-brand-500/10"><i class="fas fa-cloud-upload-alt mr-2"></i> Upload Video</a>
            </div>
        </div>
    </nav>

    <!-- Upload Section -->
    <main class="flex-grow pt-28 pb-20 relative flex items-center justify-center">
        <!-- Decorators -->
        <div class="absolute top-20 right-0 w-[40vw] h-[40vw] bg-brand-500/10 blur-[120px] rounded-full pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-[30vw] h-[30vw] bg-purple-600/10 blur-[120px] rounded-full pointer-events-none"></div>

        <div class="w-full max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 animate-fade-in">
            <div class="text-center mb-10">
                <span class="bg-brand-500/10 text-brand-500 px-4 py-1.5 rounded-full text-sm font-bold tracking-wide uppercase shadow-inner border border-brand-500/20 mb-4 inline-block">Creator Hub</span>
                <h1 class="text-4xl md:text-5xl font-black mb-4">Upload <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-purple-500">Your Video</span></h1>
                <p class="text-gray-400 text-lg font-medium">Share your creative work with millions of users on Minoz Gallery.</p>
            </div>

            <form id="upload-form" class="glass rounded-3xl p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.5)] border border-white/10" onsubmit="return false;">
                
                <!-- Drag and Drop Zone -->
                <label for="video-file" id="dropzone" class="block border-2 border-dashed border-gray-600 rounded-2xl p-12 text-center hover:border-brand-500 hover:bg-brand-500/5 transition-all cursor-pointer mb-8 bg-dark-900/40 relative overflow-hidden group">
                    <div class="w-20 h-20 rounded-full bg-dark-800 flex items-center justify-center mx-auto mb-5 text-brand-500 shadow-xl group-hover:scale-110 group-hover:bg-brand-500 group-hover:text-white transition-all duration-300">
                        <i class="fas fa-cloud-upload-alt text-3xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2 text-white">Select a video</h3>
                    <p class="text-gray-400 mb-4 font-medium">Drag and drop your video here, or <span class="text-brand-500 underline decoration-2 underline-offset-4">browse files</span></p>
                    <div class="flex items-center justify-center gap-4 text-xs font-semibold text-gray-500">
                        <span class="glass px-3 py-1 rounded-md">MP4</span>
                        <span class="glass px-3 py-1 rounded-md">WebM</span>
                        <span class="glass px-3 py-1 rounded-md">MOV</span>
                        <span class="pl-2 border-l border-gray-700">Up to 2GB</span>
                    </div>
                    <input type="file" id="video-file" class="hidden" accept="video/mp4,video/webm,video/quicktime" required>
                </label>

                <!-- Form Fields -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Video Title <span class="text-brand-500">*</span></label>
                        <input type="text" placeholder="Add a catchy title for your video" class="w-full bg-dark-800 border border-gray-700 rounded-xl py-3.5 px-5 text-white focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all shadow-inner" required>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Description</label>
                        <textarea rows="4" placeholder="Tell viewers about your video..." class="w-full bg-dark-800 border border-gray-700 rounded-xl py-3.5 px-5 text-white focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all shadow-inner"></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Category</label>
                            <div class="relative">
                                <select class="w-full bg-dark-800 border border-gray-700 rounded-xl py-3.5 px-5 text-white appearance-none focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all shadow-inner cursor-pointer font-medium">
                                    <option>Select a category</option>
                                    <option>Nature</option>
                                    <option>Technology</option>
                                    <option>Urban & City</option>
                                    <option>Cinematography</option>
                                    <option>Vlogs</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Privacy Settings</label>
                            <div class="relative">
                                <select class="w-full bg-dark-800 border border-gray-700 rounded-xl py-3.5 px-5 text-white appearance-none focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all shadow-inner cursor-pointer font-medium">
                                    <option>Public</option>
                                    <option>Unlisted</option>
                                    <option>Private</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-10 pt-8 border-t border-gray-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <p class="text-sm font-medium text-gray-500">By uploading, you agree to Minoz Gallery <a href="#" class="text-brand-500 hover:underline">Terms</a></p>
                    <button id="submit-btn" type="submit" class="w-full sm:w-auto bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 text-white font-bold py-3.5 px-10 rounded-xl transition-all shadow-[0_0_20px_rgba(236,72,153,0.3)] hover:shadow-[0_0_30px_rgba(236,72,153,0.5)] flex items-center justify-center gap-2 text-lg hover:-translate-y-1">
                        <i class="fas fa-cloud-upload-alt"></i> Publish Video
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Simple footer for upload page -->
    <footer class="bg-dark-950 border-t border-gray-800 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm font-medium">
            &copy; 2026 Minoz Gallery. Designed beautifully using TailwindCSS.
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
